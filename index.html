<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentFlow.ai - ATS Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #f8faf8; }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .nav-dropdown { position: absolute; top: 100%; left: 0; background: white; border: 1px solid #e5e7eb; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 50; min-width: 200px; }
        .kanban-column { min-width: 260px; flex-shrink: 0; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 0.5rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: white; border-left: 4px solid #10b981; padding: 1rem; border-radius: 0.375rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 1100; animation: slideIn 0.3s ease-in-out; }
        .toast-error { border-left-color: #ef4444; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback, createContext, useContext } = React;

        // ── SUPABASE CONFIG ─────────────────────────────────────────────────
        // Replace these with your project values from Supabase → Settings → API
        const SUPABASE_URL = 'https://tgsvhgxtpuibhtuiygsk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnc3ZoZ3h0cHVpYmh0dWl5Z3NrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDAxMTIsImV4cCI6MjA4OTA3NjExMn0.ZjTqDQfFd61uLvTSCgS3nHY0TF27pWgR5ca0JNLZG9o';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ── MASTER ADMIN CONFIG ───────────────────────────────────────────
        const MASTER_ADMIN_EMAIL = 'serelixai@gmail.com';

        // ── APP CONTEXT ─────────────────────────────────────────────────────
        const AppCtx = createContext({ orgId: null, user: null, profile: null, toast: () => {} });

        // ── UTILITIES ───────────────────────────────────────────────────────
        function Toast({ message, type, onDismiss }) {
            useEffect(() => { const t = setTimeout(onDismiss, 4000); return () => clearTimeout(t); }, [onDismiss]);
            return <div className={`toast ${type === 'error' ? 'toast-error' : ''}`}><p className="text-sm text-gray-800">{message}</p></div>;
        }

        function Spinner({ size = 5 }) {
            return <svg className={`spin w-${size} h-${size} text-emerald-600`} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" strokeOpacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeWidth="4" strokeLinecap="round"/></svg>;
        }

        function Logo() {
            return (
                <div className="flex items-center gap-3">
                    <div className="emerald-gradient w-8 h-8 rounded flex items-center justify-center">
                        <span className="text-white font-bold text-sm">TF</span>
                    </div>
                    <span className="font-semibold text-gray-900">TalentFlow.ai</span>
                </div>
            );
        }

        function Dropdown({ label, items, onSelect }) {
            const [open, setOpen] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                if (open) { document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h); }
            }, [open]);
            return (
                <div className="relative" ref={ref}>
                    <button onClick={() => setOpen(!open)} className="text-gray-700 hover:text-emerald-600 text-sm font-medium flex items-center gap-1">
                        {label}
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    {open && (
                        <div className="nav-dropdown">
                            {items.map(item => (
                                <button key={item.id} onClick={() => { onSelect(item); setOpen(false); }} className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 first:rounded-t last:rounded-b">
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ── AUTH PAGE ───────────────────────────────────────────────────────
        function AuthPage() {
            const [mode, setMode] = useState('login');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [company, setCompany] = useState('');
            const [inviteCode, setInviteCode] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [success, setSuccess] = useState('');
            const [isFirst, setIsFirst] = useState(null); // null=checking, true=owner slot, false=needs code

            useEffect(() => {
                if (mode === 'signup') {
                    setIsFirst(null);
                    sb.rpc('is_first_user').then(({ data }) => setIsFirst(!!data));
                }
            }, [mode]);

            const handleSignup = async () => {
                if (!name || !company || !email || !password) { setError('All fields are required.'); return; }
                if (!isFirst && !inviteCode.trim()) { setError('An invite code is required to sign up.'); return; }
                setLoading(true); setError('');
                try {
                    if (!isFirst) {
                        const { data: valid } = await sb.rpc('validate_invite', { p_code: inviteCode.trim().toUpperCase() });
                        if (!valid) { setError('Invalid or already used invite code. Contact the workspace owner.'); setLoading(false); return; }
                    }
                    const { data: { user }, error: authErr } = await sb.auth.signUp({ email, password });
                    if (authErr) throw authErr;
                    if (!user) { setSuccess('Check your email to confirm your account, then sign in.'); setLoading(false); return; }
                    const { data: org, error: orgErr } = await sb.from('organizations').insert({ name: company }).select().single();
                    if (orgErr) throw orgErr;
                    const assignedRole = isFirst ? 'Owner' : 'Admin';
                    const { error: profErr } = await sb.from('profiles').insert({ id: user.id, org_id: org.id, name, email, role: assignedRole, status: 'active' });
                    if (profErr) throw profErr;
                    if (!isFirst) { await sb.rpc('use_invite', { p_code: inviteCode.trim().toUpperCase(), p_user_id: user.id }); }
                    setSuccess(isFirst ? 'Owner account created! Signing you in...' : 'Account created! Signing you in...');
                } catch(e) { setError(e.message || 'Something went wrong.'); }
                setLoading(false);
            };

            const handleLogin = async () => {
                if (!email || !password) { setError('Email and password are required.'); return; }
                setLoading(true); setError('');
                try {
                    const { error: authErr } = await sb.auth.signInWithPassword({ email, password });
                    if (authErr) throw authErr;
                } catch(e) { setError(e.message || 'Invalid credentials.'); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-8 w-full max-w-sm">
                        <Logo />
                        <h2 className="text-xl font-bold text-gray-900 mt-6 mb-1">
                            {mode === 'login' ? 'Welcome back' : 'Create your workspace'}
                        </h2>
                        <p className="text-sm text-gray-500 mb-6">
                            {mode === 'login' ? 'Sign in to your TalentFlow account' : 'Invite-only access'}
                        </p>
                        {error && <div className="bg-red-50 border border-red-200 text-red-700 text-sm p-3 rounded-lg mb-4">{error}</div>}
                        {success && <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm p-3 rounded-lg mb-4">{success}</div>}
                        {mode === 'signup' && isFirst === null && (
                            <div className="flex justify-center py-4"><Spinner size={5} /></div>
                        )}
                        {mode === 'signup' && isFirst !== null && (
                            <>
                                {isFirst && <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs p-2 rounded-lg mb-4 text-center font-medium">Setting up as Owner account</div>}
                                <label className="block text-xs font-medium text-gray-700 mb-1">Your name</label>
                                <input value={name} onChange={e => setName(e.target.value)} placeholder="Jane Smith" className="w-full px-3 py-2 border border-gray-300 rounded-lg mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                                <label className="block text-xs font-medium text-gray-700 mb-1">Company name</label>
                                <input value={company} onChange={e => setCompany(e.target.value)} placeholder="Acme Corp" className="w-full px-3 py-2 border border-gray-300 rounded-lg mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                                {!isFirst && (
                                    <>
                                        <label className="block text-xs font-medium text-gray-700 mb-1">Invite Code</label>
                                        <input value={inviteCode} onChange={e => setInviteCode(e.target.value.toUpperCase())} placeholder="XXXXXX-XXXX" className="w-full px-3 py-2 border border-gray-300 rounded-lg mb-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                                    </>
                                )}
                            </>
                        )}
                        {(mode === 'login' || isFirst !== null) && (
                            <>
                                <label className="block text-xs font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@company.com" className="w-full px-3 py-2 border border-gray-300 rounded-lg mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                                <label className="block text-xs font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" className="w-full px-3 py-2 border border-gray-300 rounded-lg mb-5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                    onKeyDown={e => e.key === 'Enter' && (mode === 'login' ? handleLogin() : handleSignup())} />
                                <button onClick={mode === 'login' ? handleLogin : handleSignup} disabled={loading}
                                    className="w-full py-2.5 emerald-gradient text-white rounded-lg font-medium text-sm flex items-center justify-center gap-2 disabled:opacity-60">
                                    {loading ? <Spinner size={4} /> : null}
                                    {loading ? 'Please wait...' : mode === 'login' ? 'Sign in' : 'Create workspace'}
                                </button>
                            </>
                        )}
                        <p className="text-sm text-gray-500 text-center mt-4">
                            {mode === 'login' ? "Have an invite code? " : 'Already have an account? '}
                            <button onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); setSuccess(''); setIsFirst(null); }} className="text-emerald-600 font-medium">
                                {mode === 'login' ? 'Sign up' : 'Sign in'}
                            </button>
                        </p>
                    </div>
                </div>
            );
        }

        // ── NAVBAR ──────────────────────────────────────────────────────────
        function Navbar({ currentPage, onNavigate }) {
            const { profile } = useContext(AppCtx);
            const [userMenuOpen, setUserMenuOpen] = useState(false);
            const userRef = useRef(null);
            const isMaster = profile?.email === MASTER_ADMIN_EMAIL;
            useEffect(() => {
                const h = e => { if (userRef.current && !userRef.current.contains(e.target)) setUserMenuOpen(false); };
                if (userMenuOpen) { document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h); }
            }, [userMenuOpen]);

            const handleSignOut = async () => {
                try {
                    await sb.auth.signOut({ scope: 'local' });
                } catch(e) {
                    console.error('Sign out error:', e);
                }
                // Force clear state regardless
                window.location.reload();
            };

            const masterNavBtn = (page, label, icon) => (
                <button onClick={() => onNavigate(page)} className={`text-sm font-medium flex items-center gap-1.5 px-3 py-1.5 rounded-lg transition-colors ${currentPage === page ? 'bg-purple-100 text-purple-700' : 'text-gray-600 hover:text-purple-600 hover:bg-purple-50'}`}>
                    {icon && <span className="text-base">{icon}</span>}{label}
                </button>
            );

            return (
                <nav className={`${isMaster ? 'bg-gray-900' : 'bg-white'} border-b ${isMaster ? 'border-gray-700' : 'border-gray-200'} px-6 py-3 flex items-center justify-between sticky top-0 z-40`}>
                    <div className="flex items-center gap-8">
                        {isMaster ? (
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-600 w-8 h-8 rounded flex items-center justify-center">
                                    <span className="text-white font-bold text-sm">TF</span>
                                </div>
                                <div>
                                    <span className="font-semibold text-white text-sm">TalentFlow.ai</span>
                                    <span className="text-purple-400 text-xs ml-2 font-medium">Admin Console</span>
                                </div>
                            </div>
                        ) : <Logo />}
                        <div className="flex items-center gap-1">
                            {isMaster ? (
                                <>
                                    {masterNavBtn('master-overview', 'Overview', null)}
                                    {masterNavBtn('master-customers', 'Customers', null)}
                                    {masterNavBtn('master-users', 'Users', null)}
                                    {masterNavBtn('master-codes', 'Invite Codes', null)}
                                    {masterNavBtn('master-analytics', 'Analytics', null)}
                                    {masterNavBtn('master-settings', 'Settings', null)}
                                </>
                            ) : (
                                <>
                                    <button onClick={() => onNavigate('dashboard')} className={`text-sm font-medium px-3 py-1.5 rounded-lg ${currentPage === 'dashboard' ? 'text-emerald-600 bg-emerald-50' : 'text-gray-700 hover:text-emerald-600'}`}>Dashboard</button>
                                    <button onClick={() => onNavigate('pipelines')} className={`text-sm font-medium px-3 py-1.5 rounded-lg ${currentPage === 'pipelines' || currentPage.startsWith('pipeline-detail') ? 'text-emerald-600 bg-emerald-50' : 'text-gray-700 hover:text-emerald-600'}`}>Pipelines</button>
                                    <Dropdown label="Candidates" items={[{id:'overview',label:'Overview'},{id:'duplicates',label:'Duplicates'}]} onSelect={i => onNavigate('candidates-' + i.id)} />
                                    <button onClick={() => onNavigate('templates')} className={`text-sm font-medium px-3 py-1.5 rounded-lg ${currentPage === 'templates' ? 'text-emerald-600 bg-emerald-50' : 'text-gray-700 hover:text-emerald-600'}`}>Templates</button>
                                    <button onClick={() => onNavigate('nova')} className={`text-sm font-medium px-3 py-1.5 rounded-lg ${currentPage === 'nova' ? 'text-emerald-600 bg-emerald-50' : 'text-gray-700 hover:text-emerald-600'}`}>Nova</button>
                                    <Dropdown label="Organisation" items={[{id:'members',label:'Members'},{id:'leaderboard',label:'Leaderboard'}]} onSelect={i => onNavigate('org-' + i.id)} />
                                    {profile?.role === 'Owner' && (
                                        <button onClick={() => onNavigate('admin')} className={`text-sm font-medium px-2 py-1 rounded ${currentPage === 'admin' ? 'text-red-600 bg-red-50' : 'text-red-500 hover:text-red-600 hover:bg-red-50'}`}>Admin</button>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        <span className={`text-xs px-2 py-1 rounded font-medium ${isMaster ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-600'}`}>{isMaster ? 'Super Admin' : (profile?.role || 'Admin')}</span>
                        <div className="relative" ref={userRef}>
                            <button onClick={() => setUserMenuOpen(!userMenuOpen)} className={`flex items-center gap-2 text-sm ${isMaster ? 'text-gray-300 hover:text-white' : 'text-gray-700 hover:text-emerald-600'}`}>
                                <div className={`w-8 h-8 rounded-full ${isMaster ? 'bg-purple-600' : 'emerald-gradient'} flex items-center justify-center text-white text-xs font-bold`}>
                                    {(profile?.name || 'U').charAt(0).toUpperCase()}
                                </div>
                                <span className="font-medium">{profile?.name || 'User'}</span>
                            </button>
                            {userMenuOpen && (
                                <div className="nav-dropdown right-0 left-auto w-48">
                                    <div className="px-4 py-2 border-b border-gray-100">
                                        <p className="text-xs font-medium text-gray-900">{profile?.name}</p>
                                        <p className="text-xs text-gray-500">{profile?.email}</p>
                                    </div>
                                    <button onClick={handleSignOut} className="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-b">Sign out</button>
                                </div>
                            )}
                        </div>
                    </div>
                </nav>
            );
        }

        // ── DASHBOARD PAGE ──────────────────────────────────────────────────
        function DashboardPage() {
            const { orgId } = useContext(AppCtx);
            const [stats, setStats] = useState({ total: 0, hired: 0, rate: 0, pipelines: 0 });
            const [chartData, setChartData] = useState([]);
            const [recentCandidates, setRecentCandidates] = useState([]);
            const [hiredData, setHiredData] = useState([]);
            const [emailData, setEmailData] = useState([]);
            const [loading, setLoading] = useState(true);
            const lineRef = useRef(null); const lineChart = useRef(null);
            const barRef = useRef(null); const barChart = useRef(null);
            const doughnutRef = useRef(null); const doughnutChart = useRef(null);

            useEffect(() => {
                if (!orgId) return;
                const load = async () => {
                    const [{ data: candidates }, { data: pipelines }] = await Promise.all([
                        sb.from('candidates').select('id,name,stage,source,created_at').eq('org_id', orgId).order('created_at', { ascending: false }),
                        sb.from('pipelines').select('id,name').eq('org_id', orgId).eq('status', 'Active')
                    ]);
                    const all = candidates || [];
                    const hired = all.filter(c => c.stage === 'Hired').length;
                    const total = all.length;
                    setStats({ total, hired, rate: total > 0 ? Math.round((hired/total)*100) : 0, pipelines: (pipelines||[]).length });
                    setRecentCandidates(all.slice(0, 6));

                    // Line chart: candidates over last 30 days
                    const now = new Date();
                    const points = [];
                    for (let i = 30; i >= 0; i -= 3) {
                        const d = new Date(now); d.setDate(d.getDate() - i);
                        points.push({ label: d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), count: all.filter(c => new Date(c.created_at) <= d).length });
                    }
                    setChartData(points);

                    // Bar chart: hired per pipeline
                    const pipelineCounts = {};
                    all.filter(c => c.stage === 'Hired').forEach(c => { pipelineCounts[c.pipeline_name || 'Other'] = (pipelineCounts[c.pipeline_name || 'Other'] || 0) + 1; });
                    setHiredData(Object.entries(pipelineCounts).slice(0,6));

                    // Doughnut: source breakdown
                    const sourceCounts = {};
                    all.forEach(c => { sourceCounts[c.source || 'Unknown'] = (sourceCounts[c.source || 'Unknown'] || 0) + 1; });
                    setEmailData(Object.entries(sourceCounts).slice(0,5));

                    setLoading(false);
                };
                load();
            }, [orgId]);

            useEffect(() => {
                if (!lineRef.current || chartData.length === 0) return;
                if (lineChart.current) lineChart.current.destroy();
                lineChart.current = new Chart(lineRef.current, { type: 'line', data: { labels: chartData.map(d=>d.label), datasets: [{ data: chartData.map(d=>d.count), borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.1)', fill:true, tension:0.4, pointRadius:3 }] }, options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{stepSize:1}}} } });
            }, [chartData]);

            useEffect(() => {
                if (!barRef.current || hiredData.length === 0) return;
                if (barChart.current) barChart.current.destroy();
                barChart.current = new Chart(barRef.current, { type:'bar', data:{ labels:hiredData.map(d=>d[0]), datasets:[{data:hiredData.map(d=>d[1]),backgroundColor:'#10b981',borderRadius:4}] }, options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}} });
            }, [hiredData]);

            useEffect(() => {
                if (!doughnutRef.current || emailData.length === 0) return;
                if (doughnutChart.current) doughnutChart.current.destroy();
                doughnutChart.current = new Chart(doughnutRef.current, { type:'doughnut', data:{ labels:emailData.map(d=>d[0]), datasets:[{data:emailData.map(d=>d[1]),backgroundColor:['#10b981','#3b82f6','#f59e0b','#8b5cf6','#ef4444']}] }, options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}}} });
            }, [emailData]);

            if (loading) return <div className="p-12 flex justify-center"><Spinner size={8} /></div>;

            return (
                <div className="p-6">
                    <div className="grid grid-cols-4 gap-6 mb-6">
                        <div className="emerald-gradient rounded-xl p-6 text-white shadow-sm"><p className="text-sm opacity-80 font-medium">Total Candidates</p><p className="text-4xl font-bold mt-2">{stats.total}</p></div>
                        <div className="bg-white rounded-xl p-6 border border-gray-200 shadow-sm"><p className="text-sm text-gray-600 font-medium">Hired</p><p className="text-4xl font-bold text-emerald-600 mt-2">{stats.hired}</p></div>
                        <div className="bg-white rounded-xl p-6 border border-gray-200 shadow-sm"><p className="text-sm text-gray-600 font-medium">Conversion Rate</p><p className="text-4xl font-bold text-emerald-600 mt-2">{stats.rate}%</p></div>
                        <div className="bg-white rounded-xl p-6 border border-gray-200 shadow-sm"><p className="text-sm text-gray-600 font-medium">Active Pipelines</p><p className="text-4xl font-bold text-emerald-600 mt-2">{stats.pipelines}</p></div>
                    </div>
                    <div className="grid grid-cols-3 gap-6 mb-6">
                        <div className="col-span-2 bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
                            <h3 className="font-semibold text-gray-900 mb-4">Candidates Over Time</h3>
                            {chartData.length > 0 ? <canvas ref={lineRef} /> : <p className="text-sm text-gray-400 text-center py-8">Add candidates to see data</p>}
                        </div>
                        <div className="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
                            <h3 className="font-semibold text-gray-900 mb-4">Recent Activity</h3>
                            {recentCandidates.length > 0 ? recentCandidates.map(c => (
                                <div key={c.id} className="flex items-center gap-3 py-2 border-b border-gray-50 last:border-0">
                                    <div className="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 text-xs font-bold flex-shrink-0">{(c.name||'?').charAt(0)}</div>

        // ── PIPELINES PAGE ──────────────────────────────────────────────────
        function PipelinesPage({ onNavigate }) {
            const { orgId, toast } = useContext(AppCtx);
            const [pipelines, setPipelines] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showAdd, setShowAdd] = useState(false);
            const [newName, setNewName] = useState('');
            const [saving, setSaving] = useState(false);

            const load = useCallback(async () => {
                if (!orgId) return;
                const { data } = await sb.from('pipelines').select('*').eq('org_id', orgId).order('created_at', {ascending: false});
                setPipelines(data || []);
                setLoading(false);
            }, [orgId]);

            useEffect(() => { load(); }, [load]);

            const addPipeline = async () => {
                if (!newName.trim()) return;
                setSaving(true);
                const { data, error } = await sb.from('pipelines').insert({ org_id: orgId, name: newName.trim(), status: 'Active' }).select().single();
                if (error) { toast(error.message, 'error'); } else { setPipelines(p => [data, ...p]); toast('Pipeline created'); }
                setNewName(''); setShowAdd(false); setSaving(false);
            };

            const toggleStatus = async (pipeline) => {
                const newStatus = pipeline.status === 'Active' ? 'Paused' : 'Active';
                const { error } = await sb.from('pipelines').update({ status: newStatus }).eq('id', pipeline.id);
                if (error) { toast(error.message, 'error'); return; }
                setPipelines(p => p.map(x => x.id === pipeline.id ? {...x, status: newStatus} : x));
                toast(`Pipeline ${newStatus.toLowerCase()}`);
            };

            if (loading) return <div className="p-12 flex justify-center"><Spinner size={8} /></div>;

            return (
                <div className="p-6">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-900">Pipelines</h1>
                        <button onClick={() => setShowAdd(true)} className="emerald-gradient text-white px-4 py-2 rounded-lg text-sm font-medium">+ New Pipeline</button>
                    </div>
                    <div className="grid grid-cols-3 gap-4">
                        {pipelines.map(p => (
                            <div key={p.id} className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-start mb-3">
                                    <h3 className="font-semibold text-gray-900">{p.name}</h3>
                                    <span className={`text-xs px-2 py-1 rounded-full font-medium ${p.status === 'Active' ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-600'}`}>{p.status}</span>
                                </div>
                                <p className="text-xs text-gray-400 mb-4">Created {new Date(p.created_at).toLocaleDateString()}</p>
                                <div className="flex gap-2">
                                    <button onClick={() => onNavigate('pipeline-detail', p)} className="flex-1 text-center py-1.5 text-sm text-emerald-600 border border-emerald-200 rounded-lg hover:bg-emerald-50">View</button>
                                    <button onClick={() => toggleStatus(p)} className="flex-1 text-center py-1.5 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50">{p.status === 'Active' ? 'Pause' : 'Activate'}</button>
                                </div>
                            </div>
                        ))}
                        {pipelines.length === 0 && (
                            <div className="col-span-3 text-center py-16 text-gray-400">
                                <p className="text-lg font-medium mb-2">No pipelines yet</p>
                                <p className="text-sm">Create your first pipeline to start tracking candidates</p>
                            </div>
                        )}
                    </div>
                    {showAdd && (
                        <div className="modal-overlay" onClick={() => setShowAdd(false)}>
                            <div className="modal-content w-96 p-6" onClick={e => e.stopPropagation()}>
                                <h2 className="text-lg font-bold text-gray-900 mb-4">New Pipeline</h2>
                                <input value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === 'Enter' && addPipeline()} placeholder="e.g. Senior Frontend Developer" className="w-full px-3 py-2 border border-gray-300 rounded-lg mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" autoFocus />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowAdd(false)} className="flex-1 py-2 border border-gray-300 rounded-lg text-sm text-gray-700">Cancel</button>
                                    <button onClick={addPipeline} disabled={saving} className="flex-1 py-2 emerald-gradient text-white rounded-lg text-sm font-medium flex items-center justify-center gap-2 disabled:opacity-60">
                                        {saving ? <Spinner size={4} /> : null} Create
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── PIPELINE DETAIL PAGE ────────────────────────────────────────────
        function PipelineDetailPage({ pipeline, onBack }) {
            const { orgId, toast } = useContext(AppCtx);
            const stages = ['Applied', 'Screening', 'Interview', 'Technical', 'Final Round', 'Offer', 'Hired', 'Rejected'];

            const [showAdd, setShowAdd] = useState(false);
            const [form, setForm] = useState({ name:'', email:'', phone:'', source:'LinkedIn', score:70 });
            const [saving, setSaving] = useState(false);
            const [selected, setSelected] = useState(null);

            const load = useCallback(async () => {
                if (!orgId || !pipeline) return;
                const { data } = await sb.from('candidates').select('*').eq('org_id', orgId).eq('pipeline_id', pipeline.id).order('created_at', {ascending: false});
                setCandidates(data || []); setLoading(false);
            }, [orgId, pipeline]);

            useEffect(() => { load(); }, [load]);

            const addCandidate = async () => {
                if (!form.name.trim()) return;
                setSaving(true);
                const { data, error } = await sb.from('candidates').insert({ org_id: orgId, pipeline_id: pipeline.id, pipeline_name: pipeline.name, name: form.name, email: form.email, phone: form.phone, source: form.source, score: parseInt(form.score)||70, stage: 'Applied', notes: '' }).select().single();
                if (error) { toast(error.message, 'error'); } else { setCandidates(c => [data, ...c]); toast('Candidate added'); }
                setForm({ name:'', email:'', phone:'', source:'LinkedIn', score:70 }); setShowAdd(false); setSaving(false);
            };

            const moveStage = async (candidateId, newStage) => {
                const { error } = await sb.from('candidates').update({ stage: newStage }).eq('id', candidateId);
                if (error) { toast(error.message, 'error'); return; }
                setCandidates(c => c.map(x => x.id === candidateId ? {...x, stage: newStage} : x));
                if (selected?.id === candidateId) setSelected(s => ({...s, stage: newStage}));
                toast('Stage updated');
            };

            const updateNotes = async (id, notes) => {
                await sb.from('candidates').update({ notes }).eq('id', id);
                setCandidates(c => c.map(x => x.id === id ? {...x, notes} : x));
            };

            if (loading) return <div className="p-12 flex justify-center"><Spinner size={8} /></div>;

            return (

                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg> Pipelines
                        </button>
                        <span className="text-gray-300">/</span>
                        <h1 className="text-xl font-bold text-gray-900">{pipeline.name}</h1>
                        <span className={`text-xs px-2 py-1 rounded-full font-medium ${pipeline.status === 'Active' ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-600'}`}>{pipeline.status}</span>
                        <div className="ml-auto">
                            <button onClick={() => setShowAdd(true)} className="emerald-gradient text-white px-4 py-2 rounded-lg text-sm font-medium">+ Add Candidate</button>
                        </div>
                    </div>
                    <div className="flex gap-4 overflow-x-auto pb-4">
                        {stages.map(stage => {
                            const stageCandidates = candidates.filter(c => c.stage === stage);
                            return (
                                <div key={stage} className="kanban-column bg-gray-50 rounded-xl p-3 border border-gray-200">
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="text-xs font-semibold text-gray-700 uppercase tracking-wide">{stage}</h3>
                                        <span className="text-xs bg-gray-200 text-gray-600 rounded-full px-2 py-0.5 font-medium">{stageCandidates.length}</span>
                                    </div>
                                    <div className="space-y-2 min-h-8">
                                        {stageCandidates.map(c => (
                                            <div key={c.id} onClick={() => setSelected(c)} className="bg-white rounded-lg p-3 border border-gray-200 shadow-sm cursor-pointer hover:border-emerald-300 hover:shadow-md transition-all">
                                                <p className="text-sm font-medium text-gray-900">{c.name}</p>
                                                <p className="text-xs text-gray-500 mt-0.5">{c.source || 'Unknown'}</p>
                                                <div className="flex items-center gap-2 mt-2">
                                                    <div className="flex-1 bg-gray-100 rounded-full h-1.5">
                                                        <div className="bg-emerald-500 h-1.5 rounded-full" style={{width: (c.score||0)+'%'}} />
                                                    </div>
                                                    <span className="text-xs text-gray-500">{c.score||0}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    {showAdd && (
                        <div className="modal-overlay" onClick={() => setShowAdd(false)}>

                                {['name','email','phone'].map(f => (
                                    <div key={f} className="mb-3">
                                        <label className="block text-xs font-medium text-gray-700 mb-1 capitalize">{f === 'name' ? 'Full Name *' : f.charAt(0).toUpperCase()+f.slice(1)}</label>
                                        <input value={form[f]} onChange={e => setForm(x => ({...x, [f]: e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                                    </div>
                                ))}
                                <div className="mb-3">
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Source</label>
                                    <select value={form.source} onChange={e => setForm(x => ({...x, source: e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                                        {['LinkedIn','Indeed','Referral','Job Board','Career Site','Agent','Other'].map(s => <option key={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div className="mb-4">
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Score (0–100)</label>
                                    <input type="number" min="0" max="100" value={form.score} onChange={e => setForm(x => ({...x, score: e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowAdd(false)} className="flex-1 py-2 border border-gray-300 rounded-lg text-sm">Cancel</button>
                                    <button onClick={addCandidate} disabled={saving || !form.name} className="flex-1 py-2 emerald-gradient text-white rounded-lg text-sm font-medium flex items-center justify-center gap-2 disabled:opacity-60">
                                        {saving ? <Spinner size={4} /> : null} Add
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {selected && (
                        <div className="modal-overlay" onClick={() => setSelected(null)}>
                            <div className="modal-content w-2xl p-8" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h2 className="text-xl font-bold text-gray-900">{selected.name}</h2>
                                        <p className="text-sm text-gray-500 mt-0.5">{selected.email} {selected.phone ? '· '+selected.phone : ''}</p>
                                    </div>
                                    <button onClick={() => setSelected(null)} className="text-gray-400 hover:text-gray-600"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
                                </div>
                                <div className="flex gap-4 mb-4">
                                    <span className="text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded">Source: {selected.source||'Unknown'}</span>
                                    <span className="text-xs px-2 py-1 bg-emerald-100 text-emerald-700 rounded">Score: {selected.score||0}</span>
                                </div>
                                <div className="mb-4">
                                    <label className="block text-xs font-medium text-gray-700 mb-2">Move to Stage</label>
                                    <div className="flex flex-wrap gap-2">
                                        {stages.map(s => (
                                            <button key={s} onClick={() => moveStage(selected.id, s)} className={`text-xs px-3 py-1.5 rounded-lg border font-medium transition-colors ${selected.stage === s ? 'emerald-gradient text-white border-transparent' : 'border-gray-200 text-gray-600 hover:border-emerald-300'}`}>{s}</button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-2">Notes</label>
                                    <textarea defaultValue={selected.notes} onBlur={e => updateNotes(selected.id, e.target.value)} rows={4} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Add notes about this candidate..." />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── CANDIDATES OVERVIEW PAGE ────────────────────────────────────────
        function CandidatesOverviewPage() {
            const { orgId, toast } = useContext(AppCtx);
            const [candidates, setCandidates] = useState([]);
            const [pipelines, setPipelines] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [stageFilter, setStageFilter] = useState('All');
            const [selected, setSelected] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [form, setForm] = useState({ name:'', email:'', phone:'', source:'LinkedIn', pipeline_id:'', stage:'Applied', score:70 });
            const [saving, setSaving] = useState(false);
            const stages = ['All','Applied','Screening','Interview','Technical','Final Round','Offer','Hired','Rejected'];

            const load = useCallback(async () => {
                if (!orgId) return;
                const [{ data: c }, { data: p }] = await Promise.all([
                    sb.from('candidates').select('*').eq('org_id', orgId).order('created_at', {ascending: false}),
                    sb.from('pipelines').select('id,name').eq('org_id', orgId).eq('status','Active')
                ]);
                setCandidates(c||[]); setPipelines(p||[]); setLoading(false);
            }, [orgId]);

            useEffect(() => { load(); }, [load]);

            const filtered = candidates.filter(c => {
                const matchSearch = !search || c.name.toLowerCase().includes(search.toLowerCase()) || (c.email||'').toLowerCase().includes(search.toLowerCase());
                const matchStage = stageFilter === 'All' || c.stage === stageFilter;
                return matchSearch && matchStage;
            });

            const addCandidate = async () => {
                if (!form.name.trim()) return;
                setSaving(true);
                const pipeline = pipelines.find(p => p.id === form.pipeline_id);
                const { data, error } = await sb.from('candidates').insert({ org_id: orgId, name: form.name, email: form.email, phone: form.phone, source: form.source, pipeline_id: form.pipeline_id || null, pipeline_name: pipeline?.name || null, stage: form.stage, score: parseInt(form.score)||70, notes: '' }).select().single();
                if (error) { toast(error.message, 'error'); } else { setCandidates(c => [data, ...c]); toast('Candidate added'); }
                setForm({ name:'', email:'', phone:'', source:'LinkedIn', pipeline_id:'', stage:'Applied', score:70 }); setShowAdd(false); setSaving(false);
            };

            const deleteCandidate = async (id) => {
                const { error } = await sb.from('candidates').delete().eq('id', id);
                if (error) { toast(error.message, 'error'); return; }
                setCandidates(c => c.filter(x => x.id !== id)); setSelected(null); toast('Candidate removed');
            };

            const updateStage = async (id, stage) => {
                const { error } = await sb.from('candidates').update({ stage }).eq('id', id);
                if (error) { toast(error.message, 'error'); return; }
                setCandidates(c => c.map(x => x.id === id ? {...x, stage} : x));
                if (selected?.id === id) setSelected(s => ({...s, stage}));
                toast('Stage updated');
            };

            const updateNotes = async (id, notes) => {
                await sb.from('candidates').update({ notes }).eq('id', id);
                setCandidates(c => c.map(x => x.id === id ? {...x, notes} : x));
            };

            if (loading) return <div className="p-12 flex justify-center"><Spinner size={8} /></div>;

            return (
                <div className="p-6">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-900">Candidates <span className="text-gray-400 font-normal text-lg ml-1">{candidates.length}</span></h1>
                        <button onClick={() => setShowAdd(true)} className="emerald-gradient text-white px-4 py-2 rounded-lg text-sm font-medium">+ Add Candidate</button>
                    </div>
                    <div className="flex gap-3 mb-4">
                        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search candidates..." className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                        <select value={stageFilter} onChange={e => setStageFilter(e.target.value)} className="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            {stages.map(s => <option key={s}>{s}</option>)}
                        </select>
                    </div>
                    <div className="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                        <table className="w-full">
                            <thead className="bg-gray-50 border-b border-gray-200">
                                <tr>{['Name','Pipeline','Stage','Source','Score','Added'].map(h => <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wide">{h}</th>)}</tr>
                            </thead>
                            <tbody className="divide-y divide-gray-50">
                                {filtered.map(c => (
                                    <tr key={c.id} onClick={() => setSelected(c)} className="hover:bg-gray-50 cursor-pointer">
                                        <td className="px-4 py-3"><div className="flex items-center gap-3"><div className="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 text-xs font-bold flex-shrink-0">{c.name.charAt(0)}</div><div><p className="text-sm font-medium text-gray-900">{c.name}</p><p className="text-xs text-gray-500">{c.email}</p></div></div></td>
                                        <td className="px-4 py-3 text-sm text-gray-600">{c.pipeline_name || '—'}</td>
                                        <td className="px-4 py-3"><span className={`text-xs px-2 py-1 rounded-full font-medium ${c.stage==='Hired'?'bg-emerald-100 text-emerald-700':c.stage==='Rejected'?'bg-red-100 text-red-700':'bg-blue-100 text-blue-700'}`}>{c.stage}</span></td>
                                        <td className="px-4 py-3 text-sm text-gray-600">{c.source||'—'}</td>
                                        <td className="px-4 py-3"><div className="flex items-center gap-2"><div className="w-16 bg-gray-100 rounded-full h-1.5"><div className="bg-emerald-500 h-1.5 rounded-full" style={{width:(c.score||0)+'%'}}/></div><span className="text-xs text-gray-600">{c.score||0}</span></div></td>
                                        <td className="px-4 py-3 text-xs text-gray-500">{new Date(c.created_at).toLocaleDateString()}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filtered.length === 0 && <div className="text-center py-12 text-gray-400 text-sm">{search || stageFilter !== 'All' ? 'No candidates match your filters' : 'No candidates yet. Add your first one!'}</div>}
                    </div>
                    {showAdd && (
                        <div className="modal-overlay" onClick={() => setShowAdd(false)}>
                            <div className="modal-content w-96 p-6" onClick={e => e.stopPropagation()}>
                                <h2 className="text-lg font-bold text-gray-900 mb-4">Add Candidate</h2>
                                {[['name','Full Name *'],['email','Email'],['phone','Phone']].map(([f,l]) => (
                                    <div key={f} className="mb-3"><label className="block text-xs font-medium text-gray-700 mb-1">{l}</label><input value={form[f]} onChange={e => setForm(x => ({...x, [f]: e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" /></div>
                                ))}
                                <div className="mb-3"><label className="block text-xs font-medium text-gray-700 mb-1">Pipeline</label><select value={form.pipeline_id} onChange={e => setForm(x => ({...x, pipeline_id: e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">— No pipeline —</option>{pipelines.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                                <div className="mb-3"><label className="block text-xs font-medium text-gray-700 mb-1">Source</label><select value={form.source} onChange={e => setForm(x => ({...x, source: e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">{['LinkedIn','Indeed','Referral','Job Board','Career Site','Agent','Other'].map(s => <option key={s}>{s}</option>)}</select></div>
                                <div className="mb-3"><label className="block text-xs font-medium text-gray-700 mb-1">Stage</label><select value={form.stage} onChange={e => setForm(x => ({...x, stage: e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">{['Applied','Screening','Interview','Technical','Final Round','Offer','Hired','Rejected'].map(s => <option key={s}>{s}</option>)}</select></div>
                                <div className="mb-4"><label className="block text-xs font-medium text-gray-700 mb-1">Score (0–100)</label><input type="number" min="0" max="100" value={form.score} onChange={e => setForm(x => ({...x, score: e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                                <div className="flex gap-3"><button onClick={() => setShowAdd(false)} className="flex-1 py-2 border border-gray-300 rounded-lg text-sm">Cancel</button><button onClick={addCandidate} disabled={saving||!form.name} className="flex-1 py-2 emerald-gradient text-white rounded-lg text-sm font-medium flex items-center justify-center gap-2 disabled:opacity-60">{saving ? <Spinner size={4}/> : null} Add</button></div>
                            </div>
                        </div>
                    )}

        // ── DUPLICATES PAGE ─────────────────────────────────────────────────
        function DuplicatesPage() {
            const { orgId, toast } = useContext(AppCtx);
            const [dupes, setDupes] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!orgId) return;
                const load = async () => {
                    const { data } = await sb.from('candidates').select('id,name,email,pipeline_name,stage').eq('org_id', orgId);
                    const emailMap = {};
                    (data||[]).forEach(c => { if (c.email) { if (!emailMap[c.email.toLowerCase()]) emailMap[c.email.toLowerCase()] = []; emailMap[c.email.toLowerCase()].push(c); } });
                    setDupes(Object.values(emailMap).filter(g => g.length > 1));
                    setLoading(false);

                load();

            if (loading) return <div className="p-12 flex justify-center"><Spinner size={8} /></div>;

                <div className="p-6">

                        </div>
                    ))}
                </div>

        // ── TEMPLATES PAGE ──────────────────────────────────────────────────
        function TemplatesPage() {
            const { orgId, toast } = useContext(AppCtx);
            const [templates, setTemplates] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selected, setSelected] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [form, setForm] = useState({ name:'', subject:'', body:'', variables:'' });
            const [saving, setSaving] = useState(false);
            const [editing, setEditing] = useState(false);

            const load = useCallback(async () => {
                if (!orgId) return;
                const { data } = await sb.from('templates').select('*').eq('org_id', orgId).order('created_at');
                setTemplates(data||[]); setLoading(false);
            }, [orgId]);

            useEffect(() => { load(); }, [load]);

            const saveTemplate = async () => {
                if (!form.name || !form.subject) return;
                setSaving(true);
                const vars = form.variables ? form.variables.split(',').map(v => v.trim()).filter(Boolean) : [];
                const payload = { org_id: orgId, name: form.name, subject: form.subject, body: form.body, variables: vars, is_system: false };
                if (editing) {
                    const { error } = await sb.from('templates').update(payload).eq('id', editing);
                    if (error) { toast(error.message, 'error'); } else { setTemplates(t => t.map(x => x.id === editing ? {...x, ...payload} : x)); toast('Template saved'); }
                } else {
                    const { data, error } = await sb.from('templates').insert(payload).select().single();
                    if (error) { toast(error.message, 'error'); } else { setTemplates(t => [...t, data]); toast('Template created'); }
                }
                setForm({ name:'', subject:'', body:'', variables:'' }); setShowAdd(false); setEditing(false); setSaving(false);
            };

            const deleteTemplate = async (id) => {
                const { error } = await sb.from('templates').delete().eq('id', id);
                if (error) { toast(error.message, 'error'); return; }
                setTemplates(t => t.filter(x => x.id !== id)); setSelected(null); toast('Template deleted');
            };

            if (loading) return <div className="p-12 flex justify-center"><Spinner size={8} /></div>;

            return (
                <div className="p-6">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-900">Email Templates</h1>
                        <button onClick={() => { setForm({ name:'', subject:'', body:'', variables:'' }); setEditing(false); setShowAdd(true); }} className="emerald-gradient text-white px-4 py-2 rounded-lg text-sm font-medium">+ New Template</button>
                    </div>
                    <div className="grid grid-cols-3 gap-4">
                        {templates.map(t => (
                            <div key={t.id} onClick={() => setSelected(t)} className="bg-white rounded-xl border border-gray-200 p-5 cursor-pointer hover:border-emerald-300 hover:shadow-md transition-all shadow-sm">
                                <div className="flex justify-between items-start mb-2">
                                    <h3 className="font-semibold text-gray-900 text-sm">{t.name}</h3>
                                    {t.is_system && <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded">System</span>}
                                </div>
                                <p className="text-xs text-gray-500 mb-3 truncate">{t.subject}</p>
                                <p className="text-xs text-gray-400 line-clamp-2">{t.body}</p>
                                {(t.variables||[]).length > 0 && <div className="flex flex-wrap gap-1 mt-3">{(t.variables||[]).map(v => <span key={v} className="text-xs bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded">{'{{'+v+'}}'}</span>)}</div>}
                            </div>
                        ))}
                        {templates.length === 0 && <div className="col-span-3 text-center py-12 text-gray-400 text-sm">No templates yet. Create your first email template.</div>}
                    </div>
                    {(showAdd || editing) && (
                        <div className="modal-overlay" onClick={() => { setShowAdd(false); setEditing(false); }}>
                            <div className="modal-content w-2xl p-6" onClick={e => e.stopPropagation()}>
                                <h2 className="text-lg font-bold text-gray-900 mb-4">{editing ? 'Edit Template' : 'New Template'}</h2>
                                {[['name','Template Name *'],['subject','Subject Line *']].map(([f,l]) => (
                                    <div key={f} className="mb-3"><label className="block text-xs font-medium text-gray-700 mb-1">{l}</label><input value={form[f]} onChange={e => setForm(x => ({...x, [f]: e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" /></div>
                                ))}
                                <div className="mb-3"><label className="block text-xs font-medium text-gray-700 mb-1">Body</label><textarea value={form.body} onChange={e => setForm(x => ({...x, body: e.target.value}))} rows={5} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Use {{variable_name}} for dynamic fields" /></div>
                                <div className="mb-4"><label className="block text-xs font-medium text-gray-700 mb-1">Variables (comma-separated)</label><input value={form.variables} onChange={e => setForm(x => ({...x, variables: e.target.value}))} placeholder="candidate_name, date, position" className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" /></div>
                                <div className="flex gap-3"><button onClick={() => { setShowAdd(false); setEditing(false); }} className="flex-1 py-2 border border-gray-300 rounded-lg text-sm">Cancel</button><button onClick={saveTemplate} disabled={saving||!form.name||!form.subject} className="flex-1 py-2 emerald-gradient text-white rounded-lg text-sm font-medium flex items-center justify-center gap-2 disabled:opacity-60">{saving ? <Spinner size={4}/> : null} Save</button></div>
                            </div>
                        </div>
                    )}
                    {selected && !editing && (
                        <div className="modal-overlay" onClick={() => setSelected(null)}>
                            <div className="modal-content w-2xl p-8" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-4">
                                    <h2 className="text-xl font-bold text-gray-900">{selected.name}</h2>
                                    <button onClick={() => setSelected(null)} className="text-gray-400 hover:text-gray-600"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
                                </div>
                                <p className="text-sm font-medium text-gray-700 mb-1">Subject</p>
                                <p className="text-sm text-gray-900 bg-gray-50 px-3 py-2 rounded mb-4">{selected.subject}</p>
                                <p className="text-sm font-medium text-gray-700 mb-1">Body</p>
                                <pre className="text-sm text-gray-900 bg-gray-50 px-3 py-2 rounded whitespace-pre-wrap mb-4 font-sans">{selected.body}</pre>
                                {(selected.variables||[]).length > 0 && <div className="flex flex-wrap gap-1 mb-4">{selected.variables.map(v => <span key={v} className="text-xs bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded">{'{{'+v+'}}'}</span>)}</div>}
                                {!selected.is_system && (
                                    <div className="flex gap-3">
                                        <button onClick={() => { setForm({ name:selected.name, subject:selected.subject, body:selected.body, variables:(selected.variables||[]).join(', ') }); setEditing(selected.id); setSelected(null); setShowAdd(false); }} className="px-4 py-2 border border-gray-300 rounded-lg text-sm">Edit</button>
                                        <button onClick={() => deleteTemplate(selected.id)} className="px-4 py-2 text-red-600 border border-red-200 rounded-lg text-sm hover:bg-red-50">Delete</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── NOVA PAGE ───────────────────────────────────────────────────────
        function NovaPage() {
            const { orgId, toast } = useContext(AppCtx);
            const [sessions, setSessions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selected, setSelected] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [form, setForm] = useState({ candidate_name:'', score:80, status:'Passed', question:'', answer:'' });
            const [saving, setSaving] = useState(false);

            const load = useCallback(async () => {
                if (!orgId) return;
                const { data } = await sb.from('nova_sessions').select('*').eq('org_id', orgId).order('created_at', {ascending:false});
                setSessions(data||[]); setLoading(false);
            }, [orgId]);

            useEffect(() => { load(); }, [load]);

            const addSession = async () => {
                if (!form.candidate_name) return;
                setSaving(true);
                const { data, error } = await sb.from('nova_sessions').insert({ org_id: orgId, candidate_name: form.candidate_name, score: parseInt(form.score)||80, status: form.status, session_date: new Date().toISOString().split('T')[0], questions: form.question ? [{ q: form.question, a: form.answer, score: parseInt(form.score)||80 }] : [] }).select().single();
                if (error) { toast(error.message, 'error'); } else { setSessions(s => [data, ...s]); toast('Session added'); }
                setForm({ candidate_name:'', score:80, status:'Passed', question:'', answer:'' }); setShowAdd(false); setSaving(false);
            };

            const stats = { total: sessions.length, passed: sessions.filter(s => s.status==='Passed').length, avg: sessions.length > 0 ? Math.round(sessions.reduce((a,s) => a + (s.score||0), 0) / sessions.length) : 0 };

            if (loading) return <div className="p-12 flex justify-center"><Spinner size={8} /></div>;

                <div className="p-6">

                    </div>
                    <div className="grid grid-cols-4 gap-4 mb-6">
                        {[['Enabled Pipelines','Active',stats.total],['Total Sessions','Total',stats.total],['Completed','Completed',stats.passed],['Pass Rate','Pass Rate', stats.total > 0 ? Math.round((stats.passed/stats.total)*100)+'%' : '0%']].map(([l,,v]) => (
                            <div key={l} className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm"><p className="text-sm text-gray-600">{l}</p><p className="text-3xl font-bold text-emerald-600 mt-1">{v}</p></div>

                            <tbody className="divide-y divide-gray-50">
                                {sessions.map(s => (

                                        <td className="px-6 py-4 text-sm font-medium text-gray-900">{s.candidate_name}</td>
                                        <td className="px-6 py-4 text-sm font-semibold text-emerald-600">{s.score}</td>
                                        <td className="px-6 py-4"><span className={`text-xs px-2 py-1 rounded-full font-medium ${s.status==='Passed'?'bg-green-100 text-green-700':s.status==='Failed'?'bg-red-100 text-red-700':'bg-yellow-100 text-yellow-700'}`}>{s.status}</span></td>
                                        <td className="px-6 py-4 text-sm text-gray-500">{s.session_date}</td>
                                    </tr>

                        {sessions.length === 0 && <div className="text-center py-12 text-gray-400 text-sm">No screening sessions yet</div>}
                    </div>
                    {showAdd && (
                        <div className="modal-overlay" onClick={() => setShowAdd(false)}>
                            <div className="modal-content w-96 p-6" onClick={e => e.stopPropagation()}>
                                <h2 className="text-lg font-bold text-gray-900 mb-4">Log Screening Session</h2>
                                <div className="mb-3"><label className="block text-xs font-medium text-gray-700 mb-1">Candidate Name *</label><input value={form.candidate_name} onChange={e => setForm(x=>({...x,candidate_name:e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                                <div className="mb-3"><label className="block text-xs font-medium text-gray-700 mb-1">Score (0–100)</label><input type="number" value={form.score} onChange={e => setForm(x=>({...x,score:e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                                <div className="mb-3"><label className="block text-xs font-medium text-gray-700 mb-1">Status</label><select value={form.status} onChange={e => setForm(x=>({...x,status:e.target.value}))} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">{['Passed','Failed','Pending'].map(s=><option key={s}>{s}</option>)}</select></div>
                                <div className="flex gap-3"><button onClick={() => setShowAdd(false)} className="flex-1 py-2 border border-gray-300 rounded-lg text-sm">Cancel</button><button onClick={addSession} disabled={saving||!form.candidate_name} className="flex-1 py-2 emerald-gradient text-white rounded-lg text-sm font-medium flex items-center justify-center gap-2 disabled:opacity-60">{saving ? <Spinner size={4}/> : null} Save</button></div>
                            </div>
                        </div>

                                <button onClick={() => setSelected(null)} className="w-full py-2 emerald-gradient text-white rounded-lg mt-4 text-sm">Close</button>

                        </div>
                    )}

        // ── APP ROOT ─────────────────────────────────────────────────────────
        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [pageParams, setPageParams] = useState({});
            const [toasts, setToasts] = useState([]);

            const showToast = useCallback((message, type = 'success') => {
                const id = Date.now();
                setToasts(t => [...t, { id, message, type }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4500);
            }, []);

            const loadProfile = useCallback(async (uid) => {
                const { data } = await sb.from('profiles').select('*').eq('id', uid).single();
                setProfile(data || null);
            }, []);

            useEffect(() => {
                const timeout = setTimeout(() => setAuthLoading(false), 5000);
                sb.auth.getSession().then(({ data: { session } }) => {
                    clearTimeout(timeout);
                    if (session?.user) { setUser(session.user); loadProfile(session.user.id); }
                    setAuthLoading(false);
                }).catch(() => { clearTimeout(timeout); setAuthLoading(false); });
                const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, session) => {
                    if (session?.user) { setUser(session.user); await loadProfile(session.user.id); }
                    else { setUser(null); setProfile(null); }
                    if (event === 'SIGNED_IN') setCurrentPage('dashboard');
                });
                return () => { clearTimeout(timeout); subscription.unsubscribe(); };
            }, [loadProfile]);

            const navigate = (page, params = {}) => { setCurrentPage(page); setPageParams(params); };

            if (authLoading) return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                    <div className="text-center"><Spinner size={10} /><p className="text-gray-500 text-sm mt-3">Loading TalentFlow...</p></div>
                </div>
            );

            if (!user) return <AuthPage />;

            const orgId = profile?.org_id || null;
            const isMasterAdmin = profile?.email === MASTER_ADMIN_EMAIL;

            // Auto-redirect master admin to their console
            const effectivePage = isMasterAdmin && currentPage === 'dashboard' ? 'master-overview' : currentPage;

            const renderPage = () => {
                // Master admin pages
                if (effectivePage === 'master-overview') return <MasterAdminPage activeTab="overview" onNavigate={navigate} />;
                if (effectivePage === 'master-customers') return <MasterAdminPage activeTab="customers" onNavigate={navigate} />;
                if (effectivePage === 'master-users') return <MasterAdminPage activeTab="users" onNavigate={navigate} />;
                if (effectivePage === 'master-codes') return <MasterAdminPage activeTab="codes" onNavigate={navigate} />;
                if (effectivePage === 'master-analytics') return <MasterAdminPage activeTab="analytics" onNavigate={navigate} />;
                if (effectivePage === 'master-settings') return <MasterAdminPage activeTab="settings" onNavigate={navigate} />;
                // Legacy route
                if (effectivePage === 'master-admin') return <MasterAdminPage activeTab="overview" onNavigate={navigate} />;
                // Regular app pages
                if (effectivePage === 'dashboard') return <DashboardPage />;
                if (effectivePage === 'pipelines') return <PipelinesPage onNavigate={navigate} />;
                if (effectivePage.startsWith('pipeline-detail')) return <PipelineDetailPage pipeline={pageParams} onBack={() => navigate('pipelines')} />;
                if (effectivePage === 'candidates-overview') return <CandidatesOverviewPage />;
                if (effectivePage === 'candidates-duplicates') return <DuplicatesPage />;
                if (effectivePage === 'templates') return <TemplatesPage />;
                if (effectivePage === 'nova') return <NovaPage />;
                if (effectivePage.startsWith('org-')) return <OrganisationPage tab={effectivePage.replace('org-','')} />;
                if (effectivePage === 'admin') return <AdminPage />;
                return <DashboardPage />;
            };

            return (
                <AppCtx.Provider value={{ orgId, user, profile, toast: showToast }}>
                    <div className="min-h-screen bg-gray-50">
                        <Navbar currentPage={effectivePage} onNavigate={navigate} />
                        {!orgId && !isMasterAdmin && (
                            <div className="bg-yellow-50 border-b border-yellow-200 px-6 py-2 text-sm text-yellow-800 text-center">
                                Setting up your workspace... If this persists, please sign out and sign back in.
                            </div>
                        )}
                        {renderPage()}
                    </div>
                    <div className="fixed bottom-4 right-4 flex flex-col gap-2 z-50">
                        {toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} onDismiss={() => setToasts(x => x.filter(i => i.id !== t.id))} />)}
                    </div>
                </AppCtx.Provider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
